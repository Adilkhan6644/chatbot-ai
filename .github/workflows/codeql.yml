name: "CodeQL Python Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '28 9 * * 5'

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL for Python (and optionally actions)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ['python', 'actions'] # actions is optional, for workflow YAML

      # Optional: build steps if needed (for Python usually none)
      - name: Run manual build steps
        if: false  # Python doesn't require build usually
        shell: bash
        run: |
          echo "Add any manual build commands here if required"
          exit 1

      # Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
